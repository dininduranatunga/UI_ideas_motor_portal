<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Third Party Motor Insurance – Solarelle Insurance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #606bb3;
      --brand-dark:  #4f5899;
      --brand-deep:  #3d4480;
      --brand-light: #eaebf8;
      --green:       #2ecc71;
      --green-dk:    #27ae60;
      --red:         #e74c3c;
      --red-dk:      #c0392b;
      --bg:          #f5f6fa;
      --white:       #ffffff;
      --border:      #e2e3ef;
      --border-dark: #cacce0;
      --input-bg:    #f7f7fc;
      --label:       #9096c0;
      --text:        #1e1f3a;
      --sub:         #5c628a;
      --muted:       #8890b8;
      --shadow-sm:   0 2px 8px rgba(96,107,179,.08);
      --shadow-md:   0 4px 24px rgba(96,107,179,.12);
      --shadow-lg:   0 8px 40px rgba(96,107,179,.16);
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════════
       HEADER — matches solarelle.com white style
    ═══════════════════════════════════════════ */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 48px;
      gap: 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-svg {
      width: 40px; height: 40px;
    }
    .logo-name {
      font-size: 16px; font-weight: 800;
      color: var(--text); letter-spacing: .5px;
    }
    .logo-name em {
      color: var(--brand); font-style: normal;
    }
    .logo-tagline {
      font-size: 10px; font-weight: 500;
      color: var(--muted); letter-spacing: 1.2px;
      text-transform: uppercase; display: block;
      margin-top: -2px;
    }
    .header-divider {
      width: 1px; height: 28px;
      background: var(--border); margin: 0 8px;
    }
    .header-title {
      font-size: 13px; font-weight: 600;
      color: var(--sub);
    }
    .header-user {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }
    .user-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--brand-light);
      border-radius: 24px;
      padding: 6px 14px 6px 8px;
    }
    .user-avatar {
      width: 28px; height: 28px;
      background: var(--brand);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }
    .user-name {
      font-size: 13px; font-weight: 600; color: var(--brand-deep);
    }

    /* ═══════════════════════════════════════════
       STEPPER
    ═══════════════════════════════════════════ */
    .stepper-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .stepper-inner {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      align-items: stretch;
    }
    .step-tab {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0;
      position: relative;
      cursor: default;
    }
    .step-tab:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0; top: 50%; transform: translateY(-50%);
      width: 1px; height: 28px;
      background: var(--border);
    }
    .step-num {
      width: 32px; height: 32px; flex-shrink: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      transition: all .3s;
    }
    .step-num.inactive { background: var(--border); color: var(--muted); }
    .step-num.active   {
      background: var(--brand); color: white;
      box-shadow: 0 0 0 4px rgba(96,107,179,.18);
    }
    .step-num.done     { background: var(--green-dk); color: white; font-size: 14px; }
    .step-info { display: flex; flex-direction: column; }
    .step-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px;
    }
    .step-label.inactive { color: var(--muted); }
    .step-label.active   { color: var(--brand-deep); }
    .step-label.done     { color: var(--green-dk); }
    .step-desc {
      font-size: 11px; color: var(--muted); margin-top: 1px;
    }

    /* active tab underline */
    .step-tab.active-tab {
      border-bottom: 3px solid var(--brand);
      margin-bottom: -1px;
    }

    /* ═══════════════════════════════════════════
       PAGE HERO AREA
    ═══════════════════════════════════════════ */
    .page-hero {
      background: linear-gradient(135deg, var(--brand-deep) 0%, var(--brand) 60%, #7880c8 100%);
      padding: 40px 48px 36px;
    }
    .hero-inner {
      max-width: 1040px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .hero-eyebrow {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.65);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 6px;
    }
    .hero-title {
      font-size: 26px; font-weight: 800;
      color: white; line-height: 1.2;
    }
    .hero-sub {
      font-size: 13px; color: rgba(255,255,255,.75);
      margin-top: 6px;
    }
    .hero-badge {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: var(--r-md);
      padding: 14px 20px;
      text-align: center;
      min-width: 160px;
    }
    .hero-badge-label { font-size: 10px; color: rgba(255,255,255,.65); text-transform: uppercase; letter-spacing: .8px; }
    .hero-badge-val   { font-size: 18px; font-weight: 800; color: white; margin-top: 2px; }

    /* ═══════════════════════════════════════════
       CONTENT LAYOUT
    ═══════════════════════════════════════════ */
    .content-wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }

    /* ═══════════════════════════════════════════
       CARD
    ═══════════════════════════════════════════ */
    .card {
      background: var(--white);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .card-header {
      padding: 28px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-step-tag {
      font-size: 10px; font-weight: 700;
      color: var(--brand);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 20px; font-weight: 800; color: var(--text);
    }
    .card-subtitle {
      font-size: 13px; color: var(--sub); margin-top: 3px;
    }
    .card-body { padding: 36px 40px; }
    .card-footer {
      padding: 20px 40px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafbfe;
    }

    /* ═══════════════════════════════════════════
       FORM GRID
    ═══════════════════════════════════════════ */
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px 24px; }
    .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px 24px; }
    .col-span-2  { grid-column: span 2; }
    .col-span-3  { grid-column: span 3; }
    .col-span-4  { grid-column: span 4; }

    .form-group { display: flex; flex-direction: column; }

    label {
      font-size: 11px; font-weight: 700;
      color: var(--label);
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 5px;
    }
    .req { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 14px; font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      appearance: none; -webkit-appearance: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    input:focus, select:focus {
      border-color: var(--brand);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(96,107,179,.15);
    }
    input::placeholder { color: #c4c6dc; }
    input:read-only, input[readonly] {
      background: #f0f0f8;
      color: var(--sub);
      cursor: default;
      border-style: dashed;
    }

    .select-wrap { position: relative; }
    .select-wrap select { padding-right: 36px; cursor: pointer; }
    .select-wrap::after {
      content: '';
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 8px;
      border-right: 2px solid var(--label);
      border-bottom: 2px solid var(--label);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }

    .phone-wrap {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
      background: var(--input-bg);
      transition: border-color .18s, box-shadow .18s;
    }
    .phone-wrap:focus-within {
      border-color: var(--brand);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(96,107,179,.15);
    }
    .phone-prefix {
      padding: 11px 12px 11px 14px;
      background: #e8e9f5;
      font-size: 13px; font-weight: 600;
      color: var(--sub);
      border-right: 1.5px solid var(--border);
      white-space: nowrap;
      display: flex; align-items: center;
    }
    .phone-wrap input {
      border: none !important; box-shadow: none !important;
      border-radius: 0; background: transparent !important;
    }

    .field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .field-err  { font-size: 11px; color: var(--red);   margin-top: 5px; }
    .input-err  { border-color: var(--red) !important; background: #fff8f8 !important; }

    /* ═══════════════════════════════════════════
       SECTION DIVIDER
    ═══════════════════════════════════════════ */
    .section-head {
      display: flex; align-items: center; gap: 12px;
      margin: 32px 0 20px;
    }
    .section-head:first-child { margin-top: 0; }
    .section-icon {
      width: 30px; height: 30px; border-radius: var(--r-sm);
      background: var(--brand-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .section-icon svg { width: 15px; height: 15px; }
    .section-title {
      font-size: 12px; font-weight: 700;
      color: var(--brand-deep);
      text-transform: uppercase; letter-spacing: .7px;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 28px;
      border-radius: var(--r-sm);
      font-size: 13px; font-weight: 700;
      font-family: inherit; letter-spacing: .3px;
      border: none; cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--brand); color: white;
    }
    .btn-primary:hover {
      background: var(--brand-dark);
      box-shadow: 0 4px 16px rgba(96,107,179,.35);
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent; color: var(--brand);
      border: 1.5px solid var(--brand);
    }
    .btn-outline:hover { background: var(--brand-light); }
    .btn-danger {
      background: transparent; color: var(--red-dk);
      border: 1.5px solid #f5c0bb;
    }
    .btn-danger:hover { background: #fff0ee; }
    .btn-success { background: var(--green-dk); color: white; }
    .btn-success:hover {
      background: #219a52;
      box-shadow: 0 4px 14px rgba(39,174,96,.3);
      transform: translateY(-1px);
    }
    .btn-lg { padding: 13px 36px; font-size: 14px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: var(--r-sm); justify-content: center; }

    /* ═══════════════════════════════════════════
       STEP 1 — vehicle lookup panel
    ═══════════════════════════════════════════ */
    .lookup-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .lookup-left {
      padding: 48px 48px 48px 40px;
      border-right: 1px solid var(--border);
    }
    .lookup-right {
      padding: 48px 40px;
      background: linear-gradient(160deg,#f7f8fd,#eeeef9);
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; text-align: center;
    }
    .lookup-right-icon {
      width: 72px; height: 72px;
      background: var(--brand-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .lookup-right-icon svg { width: 36px; height: 36px; }
    .lookup-right-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .lookup-right-desc  { font-size: 12.5px; color: var(--sub); line-height: 1.6; max-width: 220px; }
    .lookup-right-note {
      margin-top: 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      text-align: left; width: 100%;
    }
    .lookup-right-note-label { font-size: 10px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
    .lookup-right-note-text  { font-size: 12px; color: var(--sub); }

    /* ═══════════════════════════════════════════
       STEP 4 — payment layout
    ═══════════════════════════════════════════ */
    .payment-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 0;
    }
    .payment-summary {
      padding: 36px 40px;
      border-right: 1px solid var(--border);
    }
    .payment-sidebar {
      padding: 36px 32px;
      background: linear-gradient(160deg,#f7f8fd,#eeeef9);
      display: flex; flex-direction: column;
    }

    .summary-policy-num {
      font-size: 12px; font-weight: 700; color: var(--brand);
      letter-spacing: .5px; margin-bottom: 4px;
    }
    .summary-insurance-type {
      font-size: 21px; font-weight: 800; color: var(--text); margin-bottom: 4px;
    }
    .summary-period { font-size: 12.5px; color: var(--sub); }

    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    .summary-cell {
      padding: 16px 18px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .summary-cell:nth-child(2n) { border-right: none; }
    .summary-cell:nth-last-child(-n+2) { border-bottom: none; }
    .summary-cell-full {
      grid-column: span 2;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .summary-cell-full:last-child { border-bottom: none; }
    .s-key { font-size: 10px; font-weight: 700; color: var(--label); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .s-val { font-size: 14px; color: var(--text); font-weight: 500; }
    .s-val-big { font-size: 24px; font-weight: 800; color: var(--brand); }

    .payment-sidebar-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .payment-sidebar-sub   { font-size: 12px; color: var(--sub); margin-bottom: 20px; }

    .payment-amount-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .pay-amount-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .pay-amount-val   { font-size: 32px; font-weight: 800; color: var(--brand); margin-top: 2px; }
    .pay-amount-curr  { font-size: 14px; font-weight: 600; color: var(--sub); }

    .pay-btn-stack { display: flex; flex-direction: column; gap: 10px; }
    .pay-btn-full  { width: 100%; justify-content: center; padding: 13px 24px; font-size: 14px; }

    .pay-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 4px 0;
    }
    .pay-divider::before, .pay-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .pay-divider-text { font-size: 11px; color: var(--muted); }

    .secure-note {
      margin-top: auto; padding-top: 20px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
    }

    /* ═══════════════════════════════════════════
       SUCCESS SCREEN
    ═══════════════════════════════════════════ */
    .success-wrap {
      padding: 64px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }
    .success-left { text-align: left; }
    .success-icon-wrap {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: white;
      box-shadow: 0 8px 24px rgba(39,174,96,.28);
      margin-bottom: 20px;
    }
    .success-title { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .success-sub   { font-size: 14px; color: var(--sub); line-height: 1.6; margin-bottom: 6px; }
    .policy-card {
      background: var(--brand-light);
      border: 1.5px solid #c8cbec;
      border-radius: var(--r-lg);
      padding: 28px;
    }
    .policy-card-label { font-size: 10px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .policy-card-num   { font-size: 22px; font-weight: 800; color: var(--brand-deep); margin-bottom: 16px; letter-spacing: .5px; }
    .policy-card-row   { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #d4d6ec; }
    .policy-card-row:last-child { border-bottom: none; }
    .pc-key { font-size: 12px; color: var(--sub); }
    .pc-val { font-size: 12px; font-weight: 600; color: var(--text); }

  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

/* ── DATA ─────────────────────────────────────────── */
const VEHICLE_TYPES = [
  'Motorcycle','Car','Van','Pickup','Truck','Bus','Tricycle',
  'Three-Wheeler','Lorry','Heavy Vehicle','Boat','Jet Ski',
];
const ID_TYPES = [
  { value: 'NIC',         label: 'National Identity Card' },
  { value: 'PASSPORT',    label: 'Passport' },
  { value: 'WORK_PERMIT', label: 'Work Permit' },
];
const ATOLLS = [
  { id:'Kaafu',       label:'Kaafu (K)',         islands:["Male'","Hulhumale'","Vilimale'","Thulusdhoo","Dhiffushi","Guraidhoo","Maafushi","Gulhi","Himmafushi","Kaashidhoo"] },
  { id:'Alif Alif',   label:'Alif Alif (AA)',    islands:['Rasdhoo','Thoddoo','Ukulhas','Mathiveri','Himandhoo','Feridhoo','Maalhos'] },
  { id:'Alif Dhaal',  label:'Alif Dhaal (ADh)',  islands:['Mahibadhoo','Dhidhdhoo','Mandhoo','Dhangethi','Kunburudhoo','Maamigili','Omadhoo'] },
  { id:'Baa',         label:'Baa (B)',            islands:['Eydhafushi','Thulhaadhoo','Kendhoo','Dharavandhoo','Hithaadhoo','Kamadhoo','Goidhoo'] },
  { id:'Dhaalu',      label:'Dhaalu (Dh)',        islands:['Kudahuvadhoo','Bandidhoo','Hulhudheli','Maaenboodhoo','Rinbudhoo','Vaadhoo'] },
  { id:'Faafu',       label:'Faafu (F)',          islands:['Magoodhoo','Nilandhoo','Biledhdhoo','Feeali','Dharanboodhoo'] },
  { id:'Gaafu Alif',  label:'Gaafu Alif (GA)',   islands:['Vilingili','Kolamaafushi','Dhaandhoo','Kondey','Maamendhoo'] },
  { id:'Gaafu Dhaal', label:'Gaafu Dhaal (GDh)', islands:['Thinadhoo','Faresmaathodaa','Gadhdhoo','Hoadedhdhoo','Madaveli'] },
  { id:'Gnaviyani',   label:'Gnaviyani (Gn)',     islands:['Fuvahmulah'] },

/* ── HELPERS ──────────────────────────────────────── */
function today() { return new Date().toISOString().split('T')[0]; }
function addYearMinus1(d) {
  if (!d) return '';
  const dt = new Date(d);
  dt.setFullYear(dt.getFullYear() + 1);
  dt.setDate(dt.getDate() - 1);
  return dt.toISOString().split('T')[0];
}
function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${y}`;
}
function genPolicy() {
  const n = new Date();
  return `SOL${String(n.getFullYear()).slice(-2)}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}${Math.floor(Math.random()*9000+1000)}`;
}

/* ── FIELD ────────────────────────────────────────── */
function Field({ label, required, error, hint, className='', children }) {
  return (
    <div className={`form-group ${className}`}>
      <label>
        {required && <span className="req"/>}
        {label}
      </label>
      {children}
      {hint  && !error && <div className="field-hint">{hint}</div>}
      {error && <div className="field-err">{error}</div>}
    </div>
  );
}

/* ── STEPPER ──────────────────────────────────────── */
function Stepper({ current }) {
  return (
    <div className="stepper-bar">
      <div className="stepper-inner">
        {STEP_META.map(({ label, desc }, i) => {
          const state = i < current ? 'done' : i === current ? 'active' : 'inactive';
          return (
            <div key={label} className={`step-tab ${state === 'active' ? 'active-tab' : ''}`}>
              <div className={`step-num ${state}`}>{state === 'done' ? '✓' : i + 1}</div>
              <div className="step-info">
                <div className={`step-label ${state}`}>{label}</div>
                <div className="step-desc">{desc}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Step3({ vehicle, owner, data, onChange, onNext, onBack }) {
  const [errors, setErrors] = useState({});

  function validate() {
    const e = {};
    if (!data.premium.trim() || isNaN(+data.premium) || +data.premium <= 0) e.premium = 'Enter a valid premium amount.';
    if (!data.issuingDate)     e.issuingDate    = 'Issuing date is required.';
    if (!data.proposalNumber.trim()) e.proposalNumber = 'Proposal number is required.';
    if (!data.periodFrom)      e.periodFrom     = 'Period start date is required.';
    return e;
  }
  function handleNext() {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    onNext();
  }
  function set(f, v) {
    onChange(f, v);
    setErrors(p => ({ ...p, [f]: null }));
    if (f === 'periodFrom') onChange('periodTo', addYearMinus1(v));
  }

  return (
    <div className="card">
      <div className="card-header">

              onChange={e => set('proposalNumber', e.target.value)} />

          <Field label="Issuing Date" required error={errors.issuingDate} className="col-span-2">

      </div>

      <div className="card-footer">
        <button className="btn btn-danger" onClick={onBack}>‹ &nbsp;Back</button>
        <span style={{fontSize:12,color:'var(--muted)'}}>Policy will be issued immediately after payment</span>
      </div>
    </div>
  );
}

/* ══ SUCCESS ══════════════════════════════════════════ */
function SuccessScreen({ vehicle, owner, policy, policyNumber, onReset }) {
  return (
    <div className="card">
      <div className="success-wrap">
        <div className="success-left">
          <div className="success-icon-wrap">✓</div>
          <div className="success-title">Policy Issued!</div>
          <div className="success-sub">
            Your Third Party Motor Insurance policy has been successfully created and is now active.
          </div>
          <div className="success-sub" style={{marginTop:8}}>
            A confirmation has been sent to{owner.email ? ` ${owner.email} and` : ''} +960 {owner.mobile}.
          </div>
          <div style={{marginTop:28}}>
            <button className="btn btn-primary btn-lg" onClick={onReset}>Issue Another Policy</button>
          </div>
        </div>
        <div className="success-right">
          <div className="policy-card">
            <div className="policy-card-label">Policy Certificate</div>
            <div className="policy-card-num">{policyNumber}</div>
            <div className="policy-card-row">
              <span className="pc-key">Insurance Type</span>
              <span className="pc-val">Third Party Motor</span>
            </div>
            <div className="policy-card-row">
              <span className="pc-key">Vehicle</span>
              <span className="pc-val">{vehicle.vehicleType} / {vehicle.vehicleNumber}</span>
            </div>
            <div className="policy-card-row">
              <span className="pc-key">Owner</span>
              <span className="pc-val">{owner.ownerName}</span>
            </div>
            <div className="policy-card-row">
              <span className="pc-key">Period From</span>
              <span className="pc-val">{fmtDate(policy.periodFrom)}</span>
            </div>
            <div className="policy-card-row">
              <span className="pc-key">Period To</span>
              <span className="pc-val">{fmtDate(policy.periodTo)}</span>
            </div>
            <div className="policy-card-row">
              <span className="pc-key">Premium</span>
              <span className="pc-val" style={{color:'#606bb3',fontWeight:700}}>MVR {Number(policy.premium).toFixed(2)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ APP ══════════════════════════════════════════════ */
function App() {
  const [step, setStep]   = useState(0);
  const [done, setDone]   = useState(false);
  const [policyNumber]    = useState(genPolicy);

  const [vehicle, setVehicle] = useState({ vehicleType:'', vehicleNumber:'' });
  const [owner,   setOwner]   = useState({ ownerName:'', idType:'NIC', idNumber:'', address:'', atoll:'', island:'', mobile:'', email:'' });
  const [policy,  setPolicy]  = useState({ premium:'', issuingDate:today(), proposalNumber:'', periodFrom:'', periodTo:'' });

  const upd = setter => (f, v) => setter(p => ({ ...p, [f]: v }));

  function handleReset() {
    setStep(0); setDone(false);
    setVehicle({ vehicleType:'', vehicleNumber:'' });
    setOwner({ ownerName:'', idType:'NIC', idNumber:'', address:'', atoll:'', island:'', mobile:'', email:'' });
    setPolicy({ premium:'', issuingDate:today(), proposalNumber:'', periodFrom:'', periodTo:'' });
  }

  return (
    <>
      {/* Header */}
      <header className="header">
        <div className="logo">
          <LogoSVG />
          <div>
            <div className="logo-name">SOLAR<em>ELLE</em></div>
            <span className="logo-tagline">Insurance</span>
          </div>
        </div>
        <div className="header-divider"/>
        <div className="header-title">Motor Insurance Portal</div>
        <div className="header-user">
          <div className="user-badge">
            <div className="user-avatar">OU</div>
            <div className="user-name">Online User</div>
          </div>
        </div>
      </header>

      {/* Stepper */}
      {!done && <Stepper current={step} />}

      {/* Content */}
      <div className="content-wrap">
        {done ? (
          <SuccessScreen vehicle={vehicle} owner={owner} policy={policy}
                         policyNumber={policyNumber} onReset={handleReset} />
        ) : step === 0 ? (
          <Step1 data={vehicle} onChange={upd(setVehicle)} onNext={() => setStep(1)} />
        ) : step === 1 ? (
          <Step2 data={owner} onChange={upd(setOwner)}
                 onNext={() => setStep(2)} onBack={() => setStep(0)} />
        ) : step === 2 ? (
          <Step3 vehicle={vehicle} owner={owner} data={policy} onChange={upd(setPolicy)}
                 onNext={() => setStep(3)} onBack={() => setStep(1)} />
        ) : (
          <Step4 vehicle={vehicle} owner={owner} policy={policy}
                 policyNumber={policyNumber}
                 onBack={() => setStep(2)} onPay={() => setDone(true)} />
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
