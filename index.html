<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Solaralle Insurance - UI Launcher</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0b1220;
    --card:#111827;
    --card-hover:#172033;
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:#94a3b8;
    --accent:#606db2;
    --glow:rgba(96,109,178,0.28);
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background:
        radial-gradient(circle at top left, rgba(96,109,178,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96,109,178,0.10), transparent 32%),
        var(--bg);
    color:var(--text);
    padding:50px;
}

/* HEADER */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
    margin-bottom:50px;
    flex-wrap:wrap;
}

.brand{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.brand-tag{
    width:max-content;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(96,109,178,0.12);
    border:1px solid rgba(96,109,178,0.25);
    color:#c7d2fe;
    font-size:12px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
}

.brand h1{
    font-size:42px;
    font-weight:800;
    line-height:1.1;
    letter-spacing:-1.5px;
}

.brand p{
    color:var(--muted);
    font-size:15px;
}

/* SEARCH */

.search-box{
    width:320px;
    max-width:100%;
}

.search-box input{
    width:100%;
    padding:15px 18px;
    border-radius:16px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    color:white;
    outline:none;
    font-size:14px;
    backdrop-filter:blur(10px);
    transition:0.2s;
}

.search-box input:focus{
    border-color:rgba(96,109,178,0.5);
    box-shadow:0 0 0 4px rgba(96,109,178,0.15);
}

.search-box input::placeholder{
    color:#94a3b8;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:24px;
}

/* CARD */

.card{
    position:relative;
    overflow:hidden;
    text-decoration:none;
    color:white;
    background:rgba(17,24,39,0.78);
    border:1px solid var(--border);
    border-radius:26px;
    padding:32px;
    min-height:160px;
    transition:all .3s ease;
    backdrop-filter:blur(16px);

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:linear-gradient(
        90deg,
        transparent,
        var(--accent),
        transparent
    );
    opacity:.9;
}

.card:hover{
    transform:translateY(-8px);
    background:var(--card-hover);
    border-color:rgba(96,109,178,0.35);
    box-shadow:
        0 20px 50px rgba(0,0,0,0.4),
        0 0 35px var(--glow);
}

/* LABEL */

.ui-number{
    font-size:14px;
    font-weight:700;
    color:#c7d2fe;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:16px;
}

/* TITLE */

.title{
    font-size:28px;
    font-weight:800;
    letter-spacing:-1px;
    line-height:1.3;
}

/* FOOTER */

.card-footer{
    margin-top:30px;
    display:flex;
    justify-content:flex-end;
}

.arrow{
    width:44px;
    height:44px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    transition:.25s;
    font-size:18px;
}

.card:hover .arrow{
    transform:translateX(4px);
    background:rgba(96,109,178,0.15);
    border-color:rgba(96,109,178,0.35);
}

/* PAGE FOOTER */

.page-footer{
    margin-top:55px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
}

/* RESPONSIVE */

@media(max-width:768px){

    body{
        padding:24px;
    }

    .brand h1{
        font-size:32px;
    }

    .search-box{
        width:100%;
    }

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="topbar">

    <div class="brand">

        <div class="brand-tag">
            Solaralle Insurance
        </div>

        <h1>Motor Third Party Portal UIs</h1>

        <p>
            Proposed user interface collection
        </p>

    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search UI...">
    </div>

</div>

<!-- GRID -->

<div class="grid">

    <a class="card" href="ui1.html">

        <div>
            <div class="ui-number">Proposal</div>
            <div class="title">User Interface 1</div>
        </div>

        <div class="card-footer">
            <div class="arrow">→</div>
        </div>

    </a>

    <a class="card" href="ui2.html">

        <div>
            <div class="ui-number">Proposal</div>
            <div class="title">User Interface 2</div>
        </div>

        <div class="card-footer">
            <div class="arrow">→</div>
        </div>

    </a>

    <a class="card" href="ui3.html">

        <div>
            <div class="ui-number">Proposal</div>
            <div class="title">User Interface 3</div>
        </div>

        <div class="card-footer">
            <div class="arrow">→</div>
        </div>

    </a>

    <a class="card" href="ui4.html">

        <div>
            <div class="ui-number">Proposal</div>
            <div class="title">User Interface 4</div>
        </div>

        <div class="card-footer">
            <div class="arrow">→</div>
        </div>

    </a>

</div>

<div class="page-footer">
    Solaralle Insurance • UI Proposal Collection
</div>

<script>

const searchInput = document.getElementById('searchInput');
const cards = document.querySelectorAll('.card');

searchInput.addEventListener('keyup', function(){

    const value = this.value.toLowerCase();

    cards.forEach(card => {

        const text = card.innerText.toLowerCase();

        if(text.includes(value)){
            card.style.display = 'flex';
        }else{
            card.style.display = 'none';
        }

    });

});

</script>

</body>
</html>
